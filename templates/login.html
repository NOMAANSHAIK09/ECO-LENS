<!DOCTYPE html>
<html>
<head>
  <title>EcoLens Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

<div class="bg-gray-800 p-8 rounded-2xl shadow-xl w-96">
  <h2 class="text-3xl font-bold mb-6 text-center">Login</h2>

  <form id="loginForm" class="space-y-4" method="POST" >
    <input type="username" id="username" placeholder="Username"
      class="w-full p-3 rounded-lg bg-gray-700 focus:outline-none focus:ring-2 focus:ring-green-500" required>

    <input type="password" id="password" placeholder="Password"
      class="w-full p-3 rounded-lg bg-gray-700 focus:outline-none focus:ring-2 focus:ring-green-500" required>

    <button class="w-full bg-green-500 hover:bg-green-600 p-3 rounded-lg font-semibold"type="submit">
      Login
    </button>
  </form>

  <p class="mt-4 text-center text-sm">
    No account?
    <a href="/signup" class="text-green-400 hover:underline">Sign Up</a>
  </p>

  <p id="msg" class="text-center mt-3 text-red-400"></p>
</div>

<script src="{{ url_for('static', filename='signup.js') }}"></script>

</body>
</html>
